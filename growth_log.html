<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio Studio · 个人作品集生成器</title>
<style>
/* =========================================================
   0. 设计 token
   ========================================================= */
:root{
  --bg:#ffffff;          /* 纯白主背景 */
  --bg-2:#f5f5f5;          /* 次级背景(输入框/凹陷) */
  --bg-3:#ebebeb;          /* 辅助 */
  --ink-0:#0a0a0a;         /* 主文字(纯黑) */
  --ink-1:#3a3a3a;         /* 次要(深灰) */
  --ink-2:#999999;         /* 辅助(中灰) */
  --ink-3:#d0d0d0;         /* 极弱 */
  --line:rgba(10,10,10,.08);
  --line-2:rgba(10,10,10,.04);
  --surface:#ffffff;       /* 卡片白 */
  --surface-2:#fafafa;     /* 二级卡 */

  --brand:#ff2442;         /* 小红书品牌粉(主品牌) */
  --brand-2:#ff7a8a;       /* 浅粉,渐变副色 */
  --brand-3:#ffb800;       /* 警示橙黄,次级强调 */
  --brand-glow:rgba(255,36,66,.20);
  --brand-ink:#ffffff;     /* 主品牌色上叠的文字 */

  --r:8px;                 /* 小圆角,弱化卡片感 */
  --r-sm:6px;
  --r-lg:12px;

  --shadow:0 1px 2px rgba(10,10,10,.04);
  --shadow-lg:0 8px 24px -8px rgba(10,10,10,.10);

  --font-cn:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",
            "Helvetica Neue",Arial,sans-serif;
  --font-en:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  --font-mono:"SF Mono","JetBrains Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font:15px/1.75 var(--font-cn);
  color:var(--ink-0);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
::selection{background:var(--brand);color:var(--brand-ink)}

/* 背景纯白,无装饰 */

/* =========================================================
   1. 顶栏(极简)
   ========================================================= */
header{
  position:sticky;top:0;z-index:20;
  background:rgba(255,255,255,.85);
  -webkit-backdrop-filter:saturate(180%) blur(12px);
  backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid var(--line);
  padding:14px 20px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-size:14px;
}
.brand{display:flex;align-items:center;gap:8px;font-weight:600}
.brand-mark{
  width:24px;height:24px;border-radius:6px;
  background:var(--brand);color:var(--brand-ink);
  display:grid;place-items:center;
  font-size:13px;font-weight:700;font-family:var(--font-en);
}
.brand-name{font-size:14px;font-weight:600}
.brand-name small{color:var(--ink-2);font-weight:400;margin-left:6px;font-size:12px}
.spacer{flex:1}

header select,header button,header label{
  background:transparent;color:var(--ink-0);
  border:1px solid var(--line);
  padding:6px 12px;border-radius:99px;
  cursor:pointer;font-size:13px;font-family:inherit;
  transition:all .15s;
}
header select option{color:#000}
header select:hover,header button:hover,header label:hover{
  border-color:var(--ink-1);
  background:var(--bg-2);
}
header button.primary{
  background:var(--brand);color:var(--brand-ink);
  border-color:var(--brand);font-weight:500;
}
header button.primary:hover{opacity:.88}
header input[type=file]{display:none}
header label{cursor:pointer;display:inline-flex;align-items:center;gap:6px}

/* =========================================================
   2. 主区:单列流式(小红书笔记感)
   ========================================================= */
main{
  position:relative;z-index:1;
  display:flex;flex-direction:column;gap:32px;
  padding:32px 20px 60px;
  max-width:680px;margin:0 auto;
  min-height:calc(100vh - 60px);
}
.section-title{
  font-size:13px;color:var(--ink-2);
  font-weight:500;letter-spacing:.04em;
  margin:0 0 12px;
  display:flex;align-items:center;gap:8px;
}
.section-title::before{
  content:"";width:18px;height:1px;background:var(--ink-3);
}
.section-title .num{
  color:var(--brand);font-weight:600;
}

.card{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--line-2);
  border-radius:0;
  padding:0 0 32px;
}
.card:last-child{border-bottom:none}
.card-head{
  display:flex;align-items:baseline;gap:10px;
  margin-bottom:20px;
}
.card-head h2{
  font-size:22px;font-weight:600;letter-spacing:-.01em;line-height:1.3;
  display:flex;align-items:baseline;gap:8px;
  color:var(--ink-0);
}
.card-head h2 .emoji{font-size:20px}
.card-head .ix{
  font-size:12px;color:var(--ink-2);font-weight:500;
}
.card-head .tag{
  font-size:11px;color:var(--brand);font-weight:500;
  margin-left:auto;letter-spacing:.04em;
}

/* =========================================================
   3. 表单
   ========================================================= */
label.small{
  font-size:12px;color:var(--ink-2);display:block;
  margin-bottom:6px;font-weight:500;
}
input[type=text],input[type=month],select,textarea{
  width:100%;padding:10px 0;
  border:none;
  border-bottom:1px solid var(--line);
  border-radius:0;
  font-size:14px;background:transparent;
  color:var(--ink-0);
  font-family:inherit;transition:all .15s;
}
textarea{min-height:64px;resize:vertical;line-height:1.6;padding:10px 0}
input:focus,select:focus,textarea:focus{
  outline:none;border-bottom-color:var(--brand);
  box-shadow:none;
}
input::placeholder,textarea::placeholder{color:var(--ink-3)}

.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:1fr 1fr}
@media (max-width:480px){.grid-2{grid-template-columns:1fr}}

.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.row > .col{flex:1;min-width:130px}

/* 按钮 */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--ink-0);color:#fff;
  border:none;padding:9px 18px;border-radius:99px;
  cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;
  transition:all .15s;
}
.btn:hover{opacity:.85}
.btn:active{opacity:.7}
.btn.ghost{background:transparent;color:var(--ink-0);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--ink-1);background:var(--bg-2)}
.btn.brand{background:var(--brand);color:var(--brand-ink)}
.btn.brand:hover{opacity:.88}
.btn.small{padding:5px 12px;font-size:12px}
.btn.danger{background:transparent;color:#ff5e5e;border:1px solid rgba(255,94,94,.3)}
.btn.danger:hover{background:rgba(255,94,94,.06)}

/* 分类:选中时整块变成品牌色,明显 */
.cat-pick{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;margin:4px 0 16px;
}
.cat-pick button{
  padding:12px 4px;background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  cursor:pointer;font-size:12px;color:var(--ink-1);
  transition:all .15s;text-align:center;line-height:1.3;
  font-family:inherit;
}
.cat-pick button:hover{border-color:var(--ink-1);background:var(--bg-3);color:var(--ink-0)}
.cat-pick button.sel{
  background:var(--brand);color:#fff;border-color:var(--brand);
  font-weight:600;
}
.cat-pick .ico{font-size:18px;display:block;margin-bottom:4px}
.cat-pick button.sel .ico{filter:brightness(1.2)}

.chk{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;padding:6px 0;border-radius:0;
  font-size:13px;color:var(--ink-1);cursor:pointer;
  border:none;
  transition:all .15s;user-select:none;
}
.chk:hover{color:var(--ink-0)}
.chk.on{color:var(--brand);font-weight:600}

/* Tabs:小红书无 tab,改为章节内联选择 */
.tabs{
  display:flex;gap:16px;
  border-bottom:1px solid var(--line-2);
  margin-bottom:20px;flex-wrap:wrap;
}
.tabs button{
  background:none;border:none;
  padding:10px 0;cursor:pointer;
  color:var(--ink-2);font-size:14px;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .15s;font-family:inherit;
}
.tabs button:hover{color:var(--ink-0)}
.tabs button.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}

/* 记录 */
.record{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px;
  border:none;border-bottom:1px solid var(--line-2);
  margin-bottom:14px;background:transparent;
  transition:background .15s;
  display:flex;gap:12px;align-items:flex-start;
  padding:14px 0;
}
.record:hover{background:transparent}
.record .badge{
  flex:none;min-width:54px;
  color:var(--ink-2);
  font-size:11px;font-weight:500;line-height:1.4;
  text-align:left;
  font-family:var(--font-en);
  letter-spacing:.04em;
}
.record .badge.s1{color:#ff2442}
.record .badge.s2{color:#ff7a8a}
.record .badge.s3{color:#ffb800}
.record .badge.s4{color:#0a8aff}
.record .body{flex:1;min-width:0}
.record .body .meta{font-size:11px;color:var(--ink-2);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.record .body .desc{font-size:14.5px;line-height:1.6;word-break:break-word;color:var(--ink-0)}
.record .body .tags{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.record .body .tags span{font-size:11px;background:transparent;color:var(--ink-2);padding:0;font-weight:400}
.record .body .tags span.star{color:var(--brand);font-weight:600}
.record .actions{display:flex;flex-direction:row;gap:10px;flex:none;align-items:center}
.record .actions button{font-size:12px;color:var(--ink-2);background:none;border:none;cursor:pointer;padding:0;font-family:inherit}
.record .actions button:hover{color:var(--brand)}

/* 文件 */
.filezone{
  border:1.5px dashed var(--line);border-radius:var(--r);
  padding:28px 20px;text-align:center;color:var(--ink-1);
  cursor:pointer;transition:all .15s;background:transparent;
}
.filezone:hover{border-color:var(--brand);color:var(--brand)}
.filezone .ico{font-size:24px;display:block;margin-bottom:6px}

/* 查漏 */
.quiz{
  padding:0;border-radius:0;background:transparent;
  border:none;border-bottom:1px solid var(--line-2);
  margin-bottom:18px;padding-bottom:20px;
}
.quiz .q{font-size:15px;margin-bottom:14px;line-height:1.6;font-weight:500;color:var(--ink-0)}
.quiz .opts{display:flex;gap:8px;flex-wrap:wrap}
.quiz .opts button{
  padding:8px 16px;border-radius:99px;
  border:1px solid var(--line);background:transparent;
  cursor:pointer;font-size:13px;font-weight:400;font-family:inherit;
  color:var(--ink-1);transition:all .15s;
}
.quiz .opts button:hover{border-color:var(--ink-0);color:var(--ink-0)}
.quiz .opts button.yes{color:var(--brand);border-color:var(--brand)}
.quiz .opts button.no{color:var(--ink-2)}
.quiz .opts button.maybe{color:#7a5206}
.quiz .prog{height:2px;background:var(--bg-2);border-radius:1px;overflow:hidden;margin-bottom:18px}
.quiz .prog > div{height:100%;background:var(--brand);transition:width .4s cubic-bezier(.4,0,.2,1)}

/* 搜索 */
.search{position:relative}
.search input{padding-left:0}
.search::before{display:none}

/* =========================================================
   4. 预览外壳(简化,只作为分隔标记)
   ========================================================= */
.preview-frame{
  background:transparent;
  border:none;border-radius:0;
  overflow:visible;
  height:auto;
  position:static;
  display:flex;flex-direction:column;
  box-shadow:none;
}
.preview-bar{
  background:transparent;padding:0 0 10px;
  border-bottom:1px solid var(--line-2);
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--ink-2);
  flex:none;
}
.preview-bar .dot{width:6px;height:6px;border-radius:50%;background:var(--brand)}
.preview-bar .url{
  margin-left:8px;background:transparent;border:none;
  padding:0;flex:1;text-align:left;
  color:var(--ink-1);font-size:12px;
}
.preview-body{flex:1;overflow:visible}

/* =========================================================
   5. 作品集内容(小红书极简风)
   ========================================================= */
.site{font:15px/1.85 var(--font-cn);color:var(--ink-0);background:var(--bg)}

/* ===== HERO ===== */
.hero{
  position:relative;overflow:hidden;
  padding:0 0 32px;
  background:var(--bg);
}
.hero .avatar-row{
  display:flex;align-items:center;gap:12px;
  margin-bottom:24px;
}
.hero .avatar{
  width:48px;height:48px;border-radius:50%;
  background:var(--brand);color:var(--brand-ink);
  display:grid;place-items:center;
  font-size:20px;font-weight:600;font-family:var(--font-en);
}
.hero .who{font-size:16px;font-weight:600;letter-spacing:-.01em}
.hero .who small{color:var(--ink-2);font-size:13px;margin-left:8px;font-weight:400}

.hero .role{
  font-size:12px;color:var(--ink-2);
  margin-bottom:20px;
}
.hero .role span{color:var(--ink-1)}
.hero .role b{color:var(--brand);font-weight:600}

.hero h1{
  font-size:32px;line-height:1.3;letter-spacing:-.01em;
  font-weight:600;margin-bottom:18px;
  font-family:var(--font-cn);
}
.hero h1 em{
  font-style:normal;
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero h1 u{
  text-decoration:none;
  border-bottom:2px solid var(--brand);
  padding-bottom:1px;
}
.hero .lead{
  font-size:15px;line-height:1.85;color:var(--ink-1);
  margin-bottom:24px;
  font-weight:400;
}
.hero .lead em{font-style:normal;color:var(--ink-0);font-weight:500}
.hero .lead u{
  text-decoration:none;color:var(--brand);font-weight:500;
  border-bottom:1px solid var(--brand);
}

.hero .kpis{
  display:flex;gap:20px;flex-wrap:wrap;
  margin-bottom:24px;
  padding:16px 0;
  border-top:1px solid var(--line-2);
  border-bottom:1px solid var(--line-2);
}
.hero .kpi .num{
  font-size:24px;font-weight:600;letter-spacing:-.01em;
  font-family:var(--font-en);
  color:var(--brand);
  line-height:1;
}
.hero .kpi .label{
  font-size:11px;color:var(--ink-2);margin-top:4px;
}
.hero .kpi .desc{font-size:12px;color:var(--ink-1);margin-top:2px}

.hero .ctas{display:flex;gap:8px;flex-wrap:wrap}
.hero .cta{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border:1px solid var(--ink-1);
  border-radius:99px;font-size:13px;font-weight:500;
  color:var(--ink-0);background:transparent;
  text-decoration:none;transition:all .2s;
}
.hero .cta:hover{background:var(--ink-0);color:#fff}
.hero .cta.primary{
  background:var(--ink-0);color:#fff;
}
.hero .cta.primary:hover{opacity:.85}
.hero .cta .arr{font-family:var(--font-mono);transition:transform .2s}
.hero .cta:hover .arr{transform:translateX(3px)}

/* ===== 通用 section ===== */
.section{padding:32px 0;max-width:680px;margin:0 auto}
.section + .section{border-top:1px solid var(--line-2)}
.section .eyebrow{
  font-size:11px;color:var(--ink-2);
  letter-spacing:.06em;
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section .eyebrow::before{
  content:"";width:12px;height:1px;background:var(--ink-3);
}
.section h2{
  font-size:22px;line-height:1.35;letter-spacing:-.01em;
  font-weight:600;margin-bottom:20px;
  font-family:var(--font-cn);
}
.section h2 em{
  font-style:normal;
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.section h2 u{
  text-decoration:none;
  border-bottom:2px solid var(--brand);
  padding-bottom:2px;
}

.section .body{
  font-size:14px;line-height:1.85;color:var(--ink-1);
}
.section .body p{margin-bottom:14px}
.section .body u{
  text-decoration:none;color:var(--brand);font-weight:500;
  border-bottom:1px solid var(--brand);
}
.section .body em{font-style:normal;color:var(--ink-0);font-weight:500}

/* ===== 时间线 ===== */
.history{display:flex;flex-direction:column;gap:20px}
.history .item{
  padding-bottom:20px;border-bottom:1px solid var(--line-2);
}
.history .item:last-child{border-bottom:none;padding-bottom:0}
.history .date{
  font-size:12px;color:var(--ink-2);
  margin-bottom:6px;
}
.history h3{
  font-size:16px;font-weight:600;letter-spacing:-.01em;
  margin-bottom:6px;
}
.history h3 small{color:var(--ink-2);font-weight:400;margin-left:6px;font-size:13px}
.history .desc{color:var(--ink-1);line-height:1.7;font-size:14px}
.history .desc u{
  text-decoration:none;color:var(--brand);font-weight:500;
  border-bottom:1px solid var(--brand);
}

/* ===== 技能列表(扁平文字) ===== */
.skills-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:8px 16px;
}
.skill{
  padding:6px 0;
  font-size:14px;
  display:flex;align-items:center;gap:8px;
  color:var(--ink-0);
  border-bottom:1px solid var(--line-2);
}
.skill::before{
  content:"";width:4px;height:4px;border-radius:50%;
  background:var(--brand);flex:none;
}

/* ===== 项目列表 ===== */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid var(--line-2);
}
.filter-bar .chip{
  padding:4px 12px;
  font-size:12px;
  color:var(--ink-2);background:transparent;
  font-family:inherit;cursor:pointer;
  border:none;
  transition:all .15s;
}
.filter-bar .chip:hover{color:var(--ink-0)}
.filter-bar .chip.active{color:var(--brand);font-weight:600}

.proj-list{display:flex;flex-direction:column;gap:0}
.proj{
  display:grid;grid-template-columns:1fr;gap:8px;
  padding:20px 0;
  background:transparent;
  border-bottom:1px solid var(--line-2);
  transition:background .15s;
}
.proj:hover{background:transparent}
.proj.star{
  background:transparent;
}
.proj .left .year{
  font-size:11px;
  color:var(--ink-2);
  margin-bottom:4px;
}
.proj .left .badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--ink-2);
  font-weight:400;margin-right:8px;
}
.proj .left .badge::before{
  content:"";width:4px;height:4px;border-radius:50%;
  background:var(--ink-3);flex:none;
}
.proj .left .badge.c1::before{background:#ff2442}
.proj .left .badge.c2::before{background:#ff7a8a}
.proj .left .badge.c3::before{background:#ffb800}
.proj .left .badge.c4::before{background:#0a8aff}
.proj h3{
  font-size:17px;font-weight:600;letter-spacing:-.01em;
  margin-bottom:6px;line-height:1.35;
}
.proj h3 .star-tag{
  display:inline-block;margin-left:6px;
  color:var(--brand);
  font-size:11px;font-weight:500;
  vertical-align:middle;
}
.proj .desc{color:var(--ink-1);font-size:13.5px;line-height:1.7;margin-bottom:8px}
.proj .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.proj .tags span{font-size:11px;color:var(--ink-2);font-weight:400}
.proj .tags span::before{content:"#";color:var(--ink-3);margin-right:1px}
.proj .kpi-label{
  font-size:11px;
  color:var(--ink-2);
  margin-bottom:4px;
}
.proj .kpi{
  font-size:13.5px;color:var(--ink-0);font-weight:500;
  padding-top:10px;margin-top:10px;
  border-top:1px solid var(--line-2);
}
.proj .kpi em{
  font-style:normal;color:var(--brand);font-weight:600;
}

/* ===== Thesis 论点 ===== */
.thesis-grid{
  display:grid;grid-template-columns:1fr;
  gap:0;
}
.thesis{
  padding:20px 0;
  background:transparent;
  border-bottom:1px solid var(--line-2);
}
.thesis:last-child{border-bottom:none}
.thesis .num{
  font-size:11px;
  color:var(--brand);font-weight:500;
  margin-bottom:8px;
}
.thesis h3{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:8px;line-height:1.4}
.thesis p{color:var(--ink-1);font-size:14px;line-height:1.75}

function showQ() {

  document.getElementById("qOpts").innerHTML = `

    <button class="maybe" onclick="ans('maybe')">在做</button>

}
function ans(choice) {
  const q = quizList[quizIdx];
  const out = document.getElementById("quizResult");
  if (choice === "yes" || choice === "maybe") {
    out.innerHTML += `
      <div class="record" data-q="${quizIdx}">

function confirmQuiz(idx, btn) {
  const el = btn.closest(".record");
  const supp = el.querySelector(".supp").value.trim();
  const q = quizList[idx];
  const cat = guessCat(q);
  // 入库时只保留"一句话成果"作为 desc/detail,不再写入 quiz 的原始问题(q)
  // 原始问题作为 src 留痕(可选展示),detail 段不显示问题
  const oneLine = supp || q;  // 没填成果就退到原问题文本作为标题,但 detail 为空
  records.push({
    id: Date.now() + Math.random(), cat,
    time: guessTime(q), desc: oneLine,
    detail: supp ? supp : "",   // 只写成果,不要原问题作为详情
    tags: [], star: false, draft: false, src: "quiz",
    createdAt: new Date().toISOString()
  });

  el.style.opacity = "0.4";
  btn.disabled = true; btn.textContent = "✓ 已入库";
  renderAll();

function guessCat(q) {
  for (const c of Object.keys(CAT_KEYWORDS)) {
    if (CAT_KEYWORDS[c].some(k => q.includes(k))) return c;
  }
  return "practice";
}
function guessTime(q) {
  const m = q.match(/(大一|大二|大三|大四|研一|研二|研三)/);
  const map = {"大一":"2023-09","大二":"2024-09","大三":"2025-09","大四":"2026-09","研一":"2026-09","研二":"2027-09","研三":"2028-09"};
  if (m && map[m[1]]) return map[m[1]];
  return new Date().toISOString().slice(0,7);
}

function renderSitePreview() {
  const f = document.getElementById("sitePreview");
  const inline = document.getElementById("sitePreviewInline");
  const label = document.getElementById("previewUrlLabel");
  const isMobile = document.body.classList.contains("m-mode");

  if (!profile.pName && !records.length) {
    const empty = `<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;font-family:system-ui,sans-serif;color:#999;display:flex;align-items:center;justify-content:center;background:#fafafa}</style></head><body><div>先填写资料,这里实时显示你的个人网站</div></body></html>`;
    if (f) f.srcdoc = empty;
    if (inline) { inline.style.display = "block"; inline.innerHTML = '<div style="padding:80px 20px;text-align:center;color:#999;font-family:system-ui,sans-serif">先填写资料,这里实时显示你的个人网站</div>'; }
    if (label) label.textContent = "—";
    if (isMobile && f) f.style.display = "none";
    return;
  }
  const html = buildStandaloneSite(profile, records, curTpl);
  if (f) f.srcdoc = html;
  if (inline) {
    // mobile 模式:仍然用 iframe(避免作品集 CSS 跟 Studio 污染),但把 iframe 高度自适应
    // 我们让 inline div 作为占位,通过 JS 同步 iframe 高度到 inline div
    const bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/);
    if (bodyMatch) {
      inline.style.display = "block";
      // 在 inline 容器里放一个 iframe(隔离 CSS);高度由 iframe 内容驱动
      inline.innerHTML = `<iframe id="sitePreviewMobile" style="width:100%;border:0;display:block;background:transparent" sandbox="allow-same-origin"></iframe>`;
      const mIframe = inline.querySelector("#sitePreviewMobile");
      if (mIframe) {
        mIframe.srcdoc = html;
        // 等 iframe 加载后,根据 scrollHeight 调整高度
        mIframe.onload = () => {
          try {
            const h = mIframe.contentDocument.documentElement.scrollHeight;
            mIframe.style.height = Math.max(200, h) + "px";
          } catch (e) {
            mIframe.style.height = "600px";
          }
        };
      }
    }
  }
  if (isMobile && f) f.style.display = "none";
  if (label) label.textContent = (profile.pName ? profile.pName.toLowerCase().replace(/\s+/g,"-") : "portfolio") + ".studio / preview";
}

function publishToPublic() {
  if (!profile.pName && !records.length) { alert("请先添加一些内容"); return; }
  // 复用 showTemplatePicker 选择风格;选完后自动调用 doPublish
  showTemplatePicker({ onPick: (tpl) => doPublish(tpl), primaryText: "一键发布到公网 →" });
}

function doPublish(tpl) {
  showDialog(`<div style="text-align:center;padding:24px 8px">
    <div style="font-size:32px;margin-bottom:8px">⏳</div>
    <div style="color:var(--ink-1);font-size:14px">正在生成你的个人网站…</div>
    <div style="color:var(--ink-2);font-size:12px;margin-top:6px">通常 1-2 秒</div>
  </div>`);
  // 第一步:在浏览器里生成完整 HTML 字符串
  const html = buildStandaloneSite(profile, records, tpl);
  const fname = (profile.pName || "portfolio").replace(/\s+/g, "_") + "_" + tpl + ".html";

  // 第二步:尝试本地 publish_server(开发者本机模式,直接拿到公网链接)
  const useLocal = /localhost|127\.0\.0\.1/i.test(location.hostname);
  if (useLocal) {
    // 2 秒超时,避免在公网模式下卡死
    const ctl = new AbortController();
    const tid = setTimeout(() => ctl.abort(), 2000);
    fetch("http://127.0.0.1:9876/publish", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ html, name: profile.pName || "portfolio", tpl }),
      signal: ctl.signal
    })
    .then(r => r.json().then(j => ({ status: r.status, body: j })))
    .then(({ status, body }) => {
      clearTimeout(tid);
      if (status !== 200 || !body.ok) throw new Error(body && body.message ? body.message : ("HTTP " + status));
      const url = body.publicUrl;
      showPublishSuccessDialog(url, body.filename || fname, body.size || html.length, html, tpl);
    })
    .catch(err => {
      clearTimeout(tid);
      // 本地模式失败也回退到下载
      const reason = err && err.name === "AbortError" ? "本地通道 2 秒内未响应(公网用户请用下载模式)" : err.message;
      showPublishDownloadDialog(html, fname, reason);
    });
  } else {
    // 公网用户模式:直接下载 HTML + 引导用户部署
    showPublishDownloadDialog(html, fname, null);
  }
}

    iframe.srcdoc = buildStandaloneSite(profile, records, curTplLocal);
    var dl = document.getElementById("tplDownloadBtn");
    if (dl) dl.textContent = `下载 ${STYLE_PRESETS[curTplLocal].name} →`;
    var openBtn = document.getElementById("tplOpenInNewBtn");
    if (openBtn) openBtn.dataset.tpl = curTplLocal;
  }
  // 等 modal 布局完成再设置 srcdoc,避免窄屏 iframe 宽度为 0 时渲染失败
  setTimeout(refreshPreview, 50);
  setTimeout(refreshPreview, 250);
  document.querySelectorAll(".tpl-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tpl-tab").forEach(b => b.classList.remove("on"));
      btn.classList.add("on");
      curTplLocal = btn.dataset.tpl;
      curTpl = curTplLocal; // 同步到全局,实时预览也跟随
      try { localStorage.setItem(KEY + "_tpl", curTpl); } catch(_) {}
      refreshPreview();
      // 实时刷新 Studio 预览卡片(若开着)
      if (typeof renderSitePreview === "function") renderSitePreview();
    });
  });
  document.getElementById("tplDownloadBtn").addEventListener("click", () => {
    if (opts.onPick) {
      closeDialog();
      opts.onPick(curTpl);
    } else {
      downloadSite(curTpl);
    }
  });
  document.getElementById("tplOpenInNewBtn").addEventListener("click", () => {
    const html = buildStandaloneSite(profile, records, curTpl);
    const w = window.open("", "_blank");
    if (w) { w.document.open(); w.document.write(html); w.document.close(); w.document.title = (profile.pName||"portfolio") + "_" + curTpl + ".html"; }
    else { alert("请允许弹出窗口"); }
  });
}

function downloadSite(tpl) {
  const html = buildStandaloneSite(profile, records, tpl);
  const fname = (profile.pName || "portfolio") + "_" + tpl + ".html";
  // 手机优先:用 navigator.share 直接分享/保存到文件
  if (navigator.canShare && navigator.share) {
    try {
      const file = new File([html], fname, { type: "text/html;charset=utf-8" });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: fname }).then(() => {
          toast("✓ 已分享 " + fname);
        }).catch(() => {
          // 用户取消,回退到 blob 下载
          blobDownload(html, fname);
        });
        return;
      }
    } catch (e) { /* fall through to blob */ }
  }
  blobDownload(html, fname);
}
function blobDownload(html, fname) {
  try {
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.rel = "noopener";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    toast("✓ 已下载 " + fname);
  } catch (e) {
    // 最后兜底:打开新标签展示,让用户长按保存
    const w = window.open("", "_blank");
    if (w) {
      w.document.open();
      w.document.write(html);
      w.document.close();
      w.document.title = fname;
      toast("长按页面可保存为 HTML");
    } else {
      alert("浏览器拦截了新窗口,请允许弹出窗口");
    }
  }
}

/* ---------------- 共享:基础信息 ---------------- */
function gatherBase(p, records) {
  const grouped = { course:[], contest:[], practice:[], cert:[] };
  records.forEach(r => grouped[r.cat] && grouped[r.cat].push(r));
  // 项目:contest + practice + course 合并,star 优先
  const projects = [...grouped.contest, ...grouped.practice, ...grouped.course]
    .sort((a,b) => (b.star?1:0) - (a.star?1:0) || (b.time||"").localeCompare(a.time||""));
  const allByTime = [...grouped.contest, ...grouped.practice, ...grouped.course, ...grouped.cert]
    .sort((a,b) => (b.time||"").localeCompare(a.time||""));
  const initial = (p.pName || "?").trim().slice(0,1).toUpperCase();
  const courses = (p.pCourses || "").split(/[,，]/).map(s => s.trim()).filter(Boolean);
  const contact = (p.pContact || "").split(/[,，;\s]+/).filter(Boolean);
  return { grouped, projects, allByTime, initial, courses, contact };
}

/* ---------------- 共享:正文 HTML(只展示用户数据) ---------------- */
function buildBodyHTML(p, records) {
  const B = gatherBase(p, records);
  // 章节顺序:有数据的才显示,按分类独立列,不再堆在"项目经历"
  const sections = [];
  // 关于我(bio 转段落)
  if (p.pBio && p.pBio.trim()) {
    const paras = p.pBio.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    sections.push({ title: "关于我", key: "about", about: paras, count: paras.length });
  }
  // 1. 精选项目(打 star 的所有类型)
  const stars = B.allByTime.filter(r => r.star);
  if (stars.length) {
    sections.push({
      title: "精选项目", count: stars.length, key: "star",
      items: stars
    });
  }
  // 2. 实践经历(实习等)
  if (B.grouped.practice.length) {
    sections.push({
      title: "实践经历", count: B.grouped.practice.length, key: "practice",
      items: B.grouped.practice
    });
  }
  // 3. 竞赛获奖
  if (B.grouped.contest.length) {
    sections.push({
      title: "竞赛", count: B.grouped.contest.length, key: "contest",
      items: B.grouped.contest
    });
  }
  // 4. 课程项目
  if (B.grouped.course.length) {
    sections.push({
      title: "课程项目", count: B.grouped.course.length, key: "course",
      items: B.grouped.course
    });
  }
  // 5. 证书
  if (B.grouped.cert.length) {
    sections.push({
      title: "证书", count: B.grouped.cert.length, key: "cert",
      items: B.grouped.cert
    });
  }
  // 技能栈(从所有 tags 聚合去重)
  const allTags = [];
  const seen = new Set();
  records.forEach(r => (r.tags||[]).forEach(t => { if (!seen.has(t)) { seen.add(t); allTags.push(t); } }));
  if (allTags.length) {
    sections.push({ title: "技能栈", key: "skills", count: allTags.length, tags: allTags });
  }
  // 课程(独立 list,没有时间)
  if (B.courses.length) {
    sections.push({
      title: "核心课程", count: B.courses.length, key: "courses",
      items: B.courses.map(c => ({ desc: c, cat: "course", tags: [] })),
      isCourse: true
    });
  }
  return sections;
}

function renderItem(r) {
  const cat = CATS[r.cat] || { icon: "", full: "" };
  const star = r.star ? " s1-item-star" : "";
  const starBadge = r.star ? '<span class="s1-star-badge">★ FEATURED</span>' : "";
  const starTitleSize = r.star ? " s1-title-star" : "";
  return `<div class="s1-item${star}">
    <div class="s1-row">
      <div class="s1-title${starTitleSize}">${starBadge}${escape(r.desc || "(无标题)")}</div>
      ${r.time ? `<div class="s1-date">${(r.time).slice(0,7)}</div>` : ""}
      <div class="s1-cat">${cat.icon} ${cat.full}</div>
    </div>
    ${r.detail ? `<div class="s1-detail">${escape(r.detail).replace(/\n/g,"<br>")}</div>` : ""}
    ${(r.tags||[]).length ? `<div class="s1-tags">${r.tags.map(t=>`<span>${escape(t)}</span>`).join("")}</div>` : ""}
  </div>`;
}

function renderSections(p, records) {
  const sections = buildBodyHTML(p, records);
  if (!sections.length) {
    return `<div class="s1-empty">在左侧添加经历后,这里会显示你的内容</div>`;
  }
  return sections.map(s => {
    if (s.about) {
      return `<section class="s1-section" id="s1-sec-${s.key}" data-key="${s.key}">
        <h2 class="s1-h">${s.title}</h2>
        <div class="s1-about">${s.about.map(t=>`<p>${escape(t)}</p>`).join("")}</div>
      </section>`;
    }
    if (s.tags) {
      return `<section class="s1-section" id="s1-sec-${s.key}" data-key="${s.key}">
        <h2 class="s1-h">${s.title} <em>${s.count} 项</em></h2>
        <div class="s1-skillcloud">${s.tags.map(t=>`<span class="s1-skill">${escape(t)}</span>`).join("")}</div>
      </section>`;
    }
    return `<section class="s1-section" id="s1-sec-${s.key}" data-key="${s.key}">
      <h2 class="s1-h">${s.title} <em>${s.count} 项</em></h2>
      ${s.items.map(renderItem).join("")}
    </section>`;
  }).join("");
}

function buildStandaloneSite(p, records, tpl) {
  const preset = STYLE_PRESETS[tpl] || STYLE_PRESETS.white;
  const initial = (p.pName || "?").trim().slice(0,1).toUpperCase();
  const B = gatherBase(p, records);
  const hasAny = !!(p.pName || p.pBio || p.pSchool || p.pCourses || records.length);
  // 顶部导航:从 sections 动态取 key
  const sections = buildBodyHTML(p, records);
  const navItems = sections.map(s => `<a href="#s1-sec-${s.key}" class="s1-nav-item" data-target="s1-sec-${s.key}">${s.title} <em>${s.count}</em></a>`).join("");
  const hero = hasAny ? `
<section class="s1-hero" id="s1-sec-hero">
  ${p.pPos ? `<div class="s1-tag">${escape(p.pPos)}</div>` : ""}
  ${p.pName ? `<h1 class="s1-name">${escape(p.pName)}</h1>` : ""}
  ${(p.pSchool || B.contact.length) ? `<div class="s1-meta">${[p.pSchool, B.contact[0]].filter(Boolean).map(escape).join(" · ")}</div>` : ""}
  ${p.pBio ? `<div class="s1-bio">${escape(p.pBio).split(/\n+/).map(t=>`<p>${escape(t)}</p>`).join("")}</div>` : ""}
</section>` : `<div class="s1-empty">先在 Studio 填写资料和经历</div>`;
  // KPI 数字块(精选 / 实习 / 竞赛 / 课程 / 技能)
  const kpiCounts = {
    "精选": B.projects.filter(r => r.star).length,
    "项目": B.projects.length,
    "竞赛": B.grouped.contest.length,
    "实习": B.grouped.practice.length,
    "证书": B.grouped.cert.length,
    "课程": B.courses.length,
  };
  const kpiHtml = Object.entries(kpiCounts).filter(([_,n])=>n>0).map(([k,n]) =>
    `<div class="s1-kpi"><div class="s1-kpi-n">${n}</div><div class="s1-kpi-l">${k}</div></div>`
  ).join("");
  const kpiBlock = kpiHtml ? `<div class="s1-kpis">${kpiHtml}</div>` : "";
  return `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${escape(p.pName || "Portfolio")} · ${escape(p.pPos || "")}</title>
<style>
${BASE_LAYOUT_CSS}
${preset.css}
</style></head><body>
${navItems ? `<nav class="s1-nav" id="s1Nav">${navItems}</nav>` : ""}
<main class="s1-main">
${hero}
${kpiBlock}
${renderSections(p, records)}
</main>
<footer class="s1-foot">
  <div class="s1-foot-name">${escape(p.pName || "")}</div>
  ${p.pContact ? `<div class="s1-foot-contact">${escape(p.pContact)}</div>` : ""}
  <div class="s1-foot-cr">© ${new Date().getFullYear()} · 由 Portfolio Studio 生成</div>
</footer>
<scr` + `ipt>
(function(){
  // 1. 点击导航 → 平滑滚动 + 同步高亮
  var nav = document.getElementById('s1Nav');
  if (nav) {
    nav.addEventListener('click', function(e){
      var a = e.target.closest('a.s1-nav-item');
      if (!a) return;
      e.preventDefault();
      var t = document.getElementById(a.getAttribute('data-target'));
      if (t) {
        var top = t.getBoundingClientRect().top + window.pageYOffset - 70;
        window.scrollTo({top: top, behavior: 'smooth'});
        setActive(a.getAttribute('data-target'));
      }
    });
  }
  function setActive(id){
    if (!nav) return;
    nav.querySelectorAll('a.s1-nav-item').forEach(function(x){
      x.classList.toggle('active', x.getAttribute('data-target') === id);
    });
  }
  // 2. 滚动时自动高亮当前 section
  var secIds = (nav ? Array.from(nav.querySelectorAll('a.s1-nav-item')).map(function(a){return a.getAttribute('data-target');}) : []);
  var ticking = false;
  function onScroll(){
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(function(){
      ticking = false;
      var y = window.pageYOffset + 120;
      var cur = secIds[0];
      for (var i=0;i<secIds.length;i++){
        var el = document.getElementById(secIds[i]);
        if (el && el.getBoundingClientRect().top + window.pageYOffset <= y) cur = secIds[i];
      }
      setActive(cur);
    });
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  // 初始高亮
  setTimeout(function(){ onScroll(); }, 50);
})();
</scr` + `ipt>
</body></html>`;
}

function renderAll() { renderRecords(); renderSitePreview(); }

/* =========================================================
   📱 移动版模式(URL 加 ?mode=mobile 进入)
   - 隐藏 Studio 复杂 UI
   - 单页流式:大输入框 + 浮动实时预览 + 底部"发布"大按钮
   ========================================================= */
function initMobileMode() {
  if (!/mode=mobile/.test(location.search)) return;
  document.body.classList.add("m-mode");
  // 隐藏 header 里的复杂按钮,只保留 logo、专业 select、📤 一键发布
  const header = document.querySelector("header");
  if (header) {
    // 插入"📱 移动版"小标签
    const tag = document.createElement("div");
    tag.className = "m-header-tag";
    tag.textContent = "📱 移动版";
    header.appendChild(tag);
    // 只隐藏 button / label,不隐藏 select
    Array.from(header.querySelectorAll("button, label")).forEach(el => {
      const t = (el.textContent || "").trim();
      if (t.includes("导出 JSON") || t.includes("导入 JSON") || t.includes("导出网站")) {
        el.style.display = "none";
      }
    });
  }
  // 隐藏 Studio 复杂内容,只显示关键卡片
  Array.from(document.querySelectorAll(".card")).forEach((card, i) => {
    const h = card.querySelector("h2");
    const title = h ? h.textContent : "";
    // 只保留:个人资料 / 添加经历 / 个人网站预览
    if (!/个人资料|添加经历|个人网站预览/.test(title)) {
      card.style.display = "none";
    }
  });
  // 头部增加"👁 实时预览"按钮(滚动到预览)
  const goPreview = document.createElement("button");
  goPreview.className = "m-fab-preview";
  goPreview.innerHTML = "👁 预览";
  goPreview.onclick = () => {
    const target = Array.from(document.querySelectorAll(".card h2")).find(h => /个人网站预览/.test(h.textContent));
    if (target) target.scrollIntoView({behavior:"smooth", block:"start"});
  };
  document.body.appendChild(goPreview);
  // 底部浮动"📤 一键发布"大按钮
  const fab = document.createElement("button");
  fab.className = "m-fab-publish";
  fab.innerHTML = "📤 一键发布";
  fab.onclick = () => {
    save();
    // 直接走"导出网站→选风格→发布" 流程:在 mobile 模式直接调 doPublish
    showTemplatePicker({ onPick: (tpl) => doPublish(tpl), primaryText: "📤 一键发布" });
  };
  document.body.appendChild(fab);
  // 滚动到顶部
  window.scrollTo(0, 0);
}
initMobileMode();

// 当前预览风格(white / cream / dark) — 实时预览用这个
let curTpl = localStorage.getItem(KEY + "_tpl") || "white";

// 顶部风格快速切换(必须在所有 const( STYLE_PRESETS / BASE_LAYOUT_CSS) 定义之后)
function applyTplQuickPick() {
  document.querySelectorAll("#tplQuickPick button").forEach(b => b.classList.toggle("on", b.dataset.tpl === curTpl));
  try { localStorage.setItem(KEY + "_tpl", curTpl); } catch(_) {}
  renderSitePreview();
}
document.querySelectorAll("#tplQuickPick button").forEach(btn => {
  btn.onclick = () => {
    curTpl = btn.dataset.tpl;
    applyTplQuickPick();
  };
});
applyTplQuickPick();

renderAll();
</script>
</body>
</html>
